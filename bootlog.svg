    <tspan fill="#C9D1D9">Smart India Hackathon</tspan>
    <tspan fill="#484F58"> · </tspan>
    <tspan fill="#3FB950">national winner</tspan>
    <tspan fill="#484F58"> · </tspan>
    <tspan fill="#C9D1D9">led team of 5 across </tspan>
    <tspan fill="#3FB950">10,000+</tspan>
    <tspan fill="#C9D1D9"> participants</tspan>
  </text>

  <!-- 2025 - GSoC -->
  <text x="32" y="122"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13" fill="#58A6FF">[2025]</text>
  <text x="104" y="122"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13">
    <tspan fill="#C9D1D9">Google Summer of Code</tspan>
    <tspan fill="#484F58"> · </tspan>
    <tspan fill="#3FB950">1 of ~1,500</tspan>
    <tspan fill="#C9D1D9"> accepted from </tspan>
    <tspan fill="#3FB950">40,000+</tspan>
    <tspan fill="#C9D1D9"> applicants · patches upstreamed</tspan>
  </text>

  <!-- 2025 - Samsung -->
  <text x="32" y="149"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13" fill="#58A6FF">[2025]</text>
  <text x="104" y="149"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13">
    <tspan fill="#C9D1D9">Samsung R&amp;D</tspan>
    <tspan fill="#484F58"> · </tspan>
    <tspan fill="#3FB950">61,000+</tspan>
    <tspan fill="#C9D1D9"> LOC platform · latency reduced by </tspan>
    <tspan fill="#3FB950">70%</tspan>
    <tspan fill="#C9D1D9"> · adopted internally</tspan>
  </text>

  <!-- 2026 - LKMP -->
  <text x="32" y="176"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
