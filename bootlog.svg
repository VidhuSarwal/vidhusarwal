<svg xmlns="http://www.w3.org/2000/svg" width="900" height="210" viewBox="0 0 900 210">

  <!-- Page background — matches GitHub dark -->
  <rect width="900" height="210" fill="#0D1117"/>

  <!-- Terminal chrome -->
  <rect x="0" y="0" width="900" height="36" rx="0" fill="#161B22"/>
  <line x1="0" y1="36" x2="900" y2="36" stroke="#30363D" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="5" fill="#FF5F57"/>
  <circle cx="38" cy="18" r="5" fill="#FFBD2E"/>
  <circle cx="54" cy="18" r="5" fill="#28CA41"/>

  <!-- Terminal title -->
  <text x="450" y="23" text-anchor="middle"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="10.5" letter-spacing="3.5" fill="#484F58">BOOT SEQUENCE — vidhu sarwal</text>

  <!-- ─── Content lines ─────────────────────────────────────────────── -->

  <!-- INIT -->
  <text x="32" y="68"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
