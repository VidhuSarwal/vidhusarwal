<svg xmlns="http://www.w3.org/2000/svg" width="900" height="232" viewBox="0 0 900 232">
  <defs>
    <filter id="glow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#1F6FEB" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="clip">
      <rect x="12" y="12" width="876" height="208" rx="10"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="900" height="232" fill="#0D1117"/>

  <!-- Terminal shadow -->
  <rect x="12" y="12" width="876" height="208" rx="10" fill="#161B22" filter="url(#shadow)"/>

  <!-- Terminal body clipped -->
  <g clip-path="url(#clip)">
    <!-- Main body -->
    <rect x="12" y="12" width="876" height="208" fill="#161B22"/>

    <!-- Chrome bar -->
    <rect x="12" y="12" width="876" height="44" fill="#1C2128"/>
    <line x1="12" y1="56" x2="888" y2="56" stroke="#2D333B" stroke-width="1"/>

    <!-- Subtle scanlines on body -->
    <rect x="12" y="56" width="876" height="164" fill="url(#scanlines)" opacity="0.03"/>
  </g>

  <!-- Terminal border -->
  <rect x="12" y="12" width="876" height="208" rx="10" fill="none" stroke="#2D333B" stroke-width="1" filter="url(#glow)"/>

  <!-- Traffic lights -->
  <circle cx="40" cy="34" r="6.5" fill="#FF5F57"/>
  <circle cx="62" cy="34" r="6.5" fill="#FFBD2E"/>
  <circle cx="84" cy="34" r="6.5" fill="#28CA41"/>
  <!-- dots on lights -->
  <circle cx="40" cy="34" r="2" fill="rgba(0,0,0,0.25)"/>
  <circle cx="62" cy="34" r="2" fill="rgba(0,0,0,0.25)"/>
  <circle cx="84" cy="34" r="2" fill="rgba(0,0,0,0.25)"/>

  <!-- Window title -->
  <text x="450" y="39" text-anchor="middle"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="11" letter-spacing="1.5" fill="#545D68">vidhu@github: ~</text>

  <!-- Prompt line -->
  <text x="32" y="82"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13.5">
    <tspan fill="#3FB950">❯</tspan>
    <tspan fill="#8B949E"> dmesg | grep vidhu</tspan>
  </text>

  <!-- ─── Log entries ─────────────────────────────────── -->

  <!-- INIT -->
  <text x="32" y="106"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13">
    <tspan fill="#3FB950" font-weight="600">[INIT]</tspan>
    <tspan fill="#545D68">  </tspan>
    <tspan fill="#E6EDF3">systems engineer</tspan>
    <tspan fill="#545D68">  ·  </tspan>
    <tspan fill="#8B949E">final year cs student</tspan>
  </text>

  <!-- 2024 SIH -->
  <text x="32" y="128"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13">
    <tspan fill="#58A6FF" font-weight="600">[2024]</tspan>
    <tspan fill="#545D68">  </tspan>
    <tspan fill="#8B949E">Smart India Hackathon  </tspan>
    <tspan fill="#3FB950">national winner</tspan>
    <tspan fill="#545D68">  ·  </tspan>
    <tspan fill="#E6EDF3">led team of 5 across </tspan>
    <tspan fill="#3FB950">10,000+</tspan>
    <tspan fill="#E6EDF3"> participants</tspan>
  </text>

  <!-- 2025 GSoC -->
  <text x="32" y="150"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13">
    <tspan fill="#58A6FF" font-weight="600">[2025]</tspan>
    <tspan fill="#545D68">  </tspan>
    <tspan fill="#8B949E">Google Summer of Code  </tspan>
    <tspan fill="#3FB950">1 of ~1,500</tspan>
    <tspan fill="#E6EDF3"> accepted from </tspan>
    <tspan fill="#3FB950">40,000+</tspan>
    <tspan fill="#E6EDF3"> applicants  ·  patches upstreamed</tspan>
  </text>

  <!-- 2025 Samsung -->
  <text x="32" y="172"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13">
    <tspan fill="#58A6FF" font-weight="600">[2025]</tspan>
    <tspan fill="#545D68">  </tspan>
    <tspan fill="#8B949E">Samsung R&amp;D  </tspan>
    <tspan fill="#3FB950">61,000+</tspan>
    <tspan fill="#E6EDF3"> LOC production platform  ·  latency reduced </tspan>
    <tspan fill="#3FB950">70%</tspan>
  </text>

  <!-- 2026 LKMP -->
  <text x="32" y="194"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13">
    <tspan fill="#58A6FF" font-weight="600">[2026]</tspan>
    <tspan fill="#545D68">  </tspan>
    <tspan fill="#8B949E">Linux Kernel Mentorship Program  ·  </tspan>
    <tspan fill="#E6EDF3">Linux Foundation  ·  LFX</tspan>
  </text>

  <!-- now — blinking cursor via CSS animation -->
  <text x="32" y="216"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13">
    <tspan fill="#F0883E" font-weight="600">[ now]</tspan>
    <tspan fill="#545D68">  </tspan>
    <tspan fill="#E6EDF3">building </tspan>
    <tspan id="cur" fill="#3FB950">▮</tspan>
  </text>

  <style>
    #cur { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</svg>
