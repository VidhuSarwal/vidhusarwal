  <text x="104" y="68"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13" fill="#8B949E">systems engineer</text>
  <text x="285" y="68"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13" fill="#484F58"> · </text>
  <text x="306" y="68"
    font-family="'SF Mono','Fira Code','Courier New',Consolas,monospace"
    font-size="13" fill="#8B949E">final year cs student</text>

